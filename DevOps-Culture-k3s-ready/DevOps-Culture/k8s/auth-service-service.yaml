apiVersion: v1
kind: Service
metadata:
  name: taskflow-auth-service
  namespace: taskflow
  labels:
    app: taskflow
    component: auth-service
spec:
  selector:
    app: taskflow
    component: auth-service
  ports:
  - name: http
    port: 5003
    targetPort: 5003
    protocol: TCP
  type: ClusterIP
