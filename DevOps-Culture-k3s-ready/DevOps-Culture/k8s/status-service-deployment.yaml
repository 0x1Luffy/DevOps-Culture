apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-status-service
  namespace: taskflow
  labels:
    app: taskflow
    component: status-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow
      component: status-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: taskflow
        component: status-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
      - name: status-service
        image: 0x1luffy/status-service-taskflow:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5004
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "5004"
        - name: BACKEND_HEALTH_URL
          value: "http://taskflow-backend:5000/health"
        - name: STATS_HEALTH_URL
          value: "http://taskflow-stats-service:5001/health"
        - name: NOTIFICATION_HEALTH_URL
          value: "http://taskflow-notification-service:5002/health"
        - name: AUTH_HEALTH_URL
          value: "http://taskflow-auth-service:5003/health"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
